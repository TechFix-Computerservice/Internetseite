<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leistungen - TechFix</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 text-white">

<header class="p-6 flex justify-between items-center">
  <h1 class="text-2xl font-bold">TechFix</h1>
  <a href="index.html">Zurück</a>
</header>

<section class="text-center py-16">
  <h2 class="text-4xl font-bold mb-10">Unsere Leistungen</h2>

  <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto px-6">

    <div class="bg-white/10 backdrop-blur p-6 rounded-2xl hover:scale-105 transition">
      <i data-lucide="cpu" class="mx-auto mb-4"></i>
      <h3 class="font-bold text-xl">PC Reparatur</h3>
      <p>Hardware & Software Probleme lösen</p>
    </div>

    <div class="bg-white/10 backdrop-blur p-6 rounded-2xl hover:scale-105 transition">
      <i data-lucide="shield" class="mx-auto mb-4"></i>
      <h3 class="font-bold text-xl">Virenentfernung</h3>
      <p>Malware & Trojaner entfernen</p>
    </div>

    <div class="bg-white/10 backdrop-blur p-6 rounded-2xl hover:scale-105 transition">
      <i data-lucide="database" class="mx-auto mb-4"></i>
      <h3 class="font-bold text-xl">Datensicherung</h3>
      <p>Daten sichern & übertragen</p>
    </div>

    <div class="bg-white/10 backdrop-blur p-6 rounded-2xl hover:scale-105 transition">
      <i data-lucide="wind" class="mx-auto mb-4"></i>
      <h3 class="font-bold text-xl">Innenreinigung</h3>
      <p>Staub entfernen + Kühlung verbessern</p>
    </div>

    <div class="bg-white/10 backdrop-blur p-6 rounded-2xl hover:scale-105 transition">
      <i data-lucide="download" class="mx-auto mb-4"></i>
      <h3 class="font-bold text-xl">Software Installation</h3>
      <p>Windows & Programme installieren</p>
    </div>

  </div>
</section>

<script>lucide.createIcons();</script>
</body>
</html>
